<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50" ng-app="mathApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title ng-bind="getPageTitle()"></title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body ng-controller="DirectoryController" class="h-full text-slate-800 bg-slate-50 flex flex-col">

    <!-- Main Container -->
    <div class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1">
        <!-- STICKY HEADER WRAPPER -->
        <div class="sticky top-0 z-30 bg-slate-50/95 backdrop-blur-md pt-6 pb-4 border-b border-slate-200 mb-6">
            
            <!-- Header Block with Dynamic Title & Status Badge -->
            <div class="mb-4 pb-4 border-b border-slate-200/60 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900" ng-bind="getPageTitle()">
                            Academic Resources
                        </h1>
                    </div>
                </div>
                
                <!-- Control Actions & Sync Status -->
                <div class="flex items-center gap-2 shrink-0">
                    <span class="inline-flex items-center px-2.5 py-1.5 rounded-full text-[10px] sm:text-xs font-semibold border transition-all duration-300"
                          ng-class="isSandbox ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'">
                        <span class="w-1.5 h-1.5 mr-1.5 rounded-full" ng-class="isSandbox ? 'bg-amber-500' : 'bg-emerald-500 animate-pulse'"></span>
                        <span ng-bind="isSandbox ? 'Offline / Sandbox' : 'Synced'"></span>
                    </span>
                </div>
            </div>


            <!-- Filter & Search Panel -->
            <div class="flex flex-col md:flex-row gap-4 justify-between items-stretch md:items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                <div class="relative flex-1 max-w-lg">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs select-none">🔍</span>
                    <input type="text" ng-model="searchQuery" placeholder="Search resources..." 
                           class="w-full pl-8 pr-4 py-2 rounded-lg border border-slate-200 bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-indigo-500 text-xs">
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- Active tag filter indication -->
                    <div class="flex items-center space-x-1.5 text-xs font-semibold bg-slate-100 px-2 py-1 rounded-md text-slate-600" ng-show="selectedTagFilter">
                        <span>Tag: <span class="text-sky-600 font-bold" ng-bind="selectedTagFilter"></span></span>
                        <button ng-click="clearTagFilter()" class="hover:text-red-500 transition-colors font-bold text-sm leading-none pb-0.5">
                            &times;
                        </button>
                    </div>

                    <div class="text-xs text-slate-500 font-medium">
                        Found <span class="font-bold text-slate-800" ng-bind="matchCount">0</span> resources
                    </div>
                </div>
            </div>
        </div>

        <!-- SCROLLABLE MAIN CONTENT -->
        <div class="pb-12">
            <!-- LAYER 1 (Outermost): Grouped dynamically by Subject -->
            <div ng-repeat="subject in filteredSubjects" class="mb-10 animate-fade-in">
                
                <!-- Subject Header (displays only if viewing all subjects globally) -->
                <div ng-if="!targetSubjectParam" class="flex items-center gap-2 mb-4 bg-slate-100/80 p-3 rounded-xl border border-slate-200/50">
                    <span class="bg-slate-800 text-white text-[10px] tracking-wider font-mono font-bold px-2 py-1 rounded" ng-bind="subject.subject_alias"></span>
                    <h2 class="text-sm font-bold text-slate-900" ng-bind="subject.subject_name"></h2>
                </div>
                
                <!-- LAYER 2: Grouped by Category under Subject -->
                <div ng-repeat="category in getFilteredCategoriesForSubject(subject)" class="mb-6 ml-1 sm:ml-2">
                    
                    <!-- Category Subheader -->
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 border-b border-slate-200/60 pb-1" ng-bind="category"></h3>
                    
                    <!-- LAYER 3: Resource Cards Grid directly under Category Header -->
                    <main class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-4">
                        
                        <!-- Resource Cards -->
                        <div ng-repeat="res in subject.resources | filter:{category: category}:true" 
                             class="flex flex-col justify-between bg-white border border-slate-200 rounded-xl p-4 shadow-sm animate-fade-in"
                             style="border-top: 3px solid {{res.theme || '#0ea5e9'}};">
                            
                            <div class="space-y-2">
                                <div class="flex justify-between items-start gap-2">
                                    <h3 class="font-bold text-sm text-slate-800 leading-snug" ng-bind="res.name"></h3>
                                </div>
                                <p class="text-slate-500 text-[11px] leading-relaxed whitespace-pre-line" ng-bind="res.description"></p>
                            </div>

                            <div class="mt-4 pt-3 border-t border-slate-100 flex flex-col space-y-2.5">
                                <!-- Tags List -->
                                <div class="flex flex-wrap gap-1" ng-if="res.tags">
                                    <span ng-repeat="tag in getTagsArray(res.tags)" 
                                          class="px-1.5 py-0.5 rounded text-[9px] font-semibold bg-slate-50 text-slate-500 border border-slate-150">
                                        {{tag}}
                                    </span>
                                </div>

                                <!-- Interactive CMS Actions footer -->
                                <div class="flex items-center justify-between pt-1">
                                    <div class="flex items-center gap-1.5">
                                        <button ng-click="openEditModal(subject, res)" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-2 py-1 rounded transition-colors">
                                            ✏️ Edit
                                        </button>
                                        <button ng-click="confirmDelete(subject, res)" class="text-[10px] font-bold text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors">
                                            🗑 Delete
                                        </button>
                                    </div>
                                    <a href="{{res.url}}" target="_blank" rel="noopener noreferrer" 
                                       class="px-2 py-1 rounded text-[9px] font-bold text-slate-400 hover:text-slate-600 bg-slate-100 transition-colors">
                                        Link ↗
                                    </a>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            </div>

            <!-- Zero Results Empty State -->
            <div class="flex flex-col items-center justify-center py-16 text-center" ng-show="matchCount === 0">
                <div class="bg-slate-100 w-10 h-10 flex items-center justify-center rounded-full mb-3 text-sm select-none">
                    ❓
                </div>
                <h3 class="text-sm font-bold text-slate-800">No results</h3>
            </div>
        </div>

    </div>

    <!-- ANGULARJS CONTROLLER -->
    <script>
        const app = angular.module('mathApp', []);

        app.controller('DirectoryController', ['$scope', '$http', function($scope, $http) {
            
            $scope.subjects = [];
            $scope.filteredSubjects = [];
            $scope.matchCount = 0;
            $scope.selectedTagFilter = null;
            $scope.searchQuery = '';
            $scope.isSandbox = false;

            // Extract standard URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            $scope.targetSubjectParam = urlParams.get('subj'); // e.g., 'mth' or 'phy'

            const externalBaseUrl = '';

            $scope.loadDirectoryData = function() {
                // Determine database filename dynamically based on subject parameter and format it in lower case
                const dbFile = externalBaseUrl + $scope.targetSubjectParam 
                    ? 'db-' + $scope.targetSubjectParam.toLowerCase() + '.json' 
                    : 'db.json';

                $http.get(dbFile)
                    .then(function(response) {
                        let data = response.data;
                        
                        // Enforce array wrapping for strict parsing compatibility
                        if (data && !angular.isArray(data)) {
                            data = [data];
                        }
                        
                        $scope.subjects = data || [];
                        $scope.isSandbox = false;
                    }, function(error) {
                        $scope.subjects = [];
                        $scope.isSandbox = true;
                    });
            };

            // Dynamically yields the custom page title header (with fallback checks)
            $scope.getPageTitle = function() {
                if ($scope.targetSubjectParam && $scope.subjects && $scope.subjects.length > 0) {
                    const matched = $scope.subjects.find(s => s && s.subject_alias && s.subject_alias.toLowerCase() === $scope.targetSubjectParam.toLowerCase());
                    if (matched) {
                        return matched.subject_name;
                    }
                }
                return "Academic Resources";
            };

            $scope.getTagsArray = function(tagsStr) {
                if (!tagsStr) return [];
                return tagsStr.split(',').map(t => t.trim()).filter(Boolean);
            };

            // Recalculates matching elements safely without triggering angular digest exceptions
            $scope.updateFilteredData = function() {
                if (!$scope.subjects) {
                    $scope.filteredSubjects = [];
                    $scope.matchCount = 0;
                    return;
                }
                
                const result = [];
                let totalMatches = 0;
                const query = ($scope.searchQuery || '').trim().toLowerCase();
                
                $scope.subjects.forEach(subj => {
                    if (!subj) return;
                    
                    const subjAlias = subj.subject_alias || '';
                    const subjName = subj.subject_name || '';

                    // Ignore non-matching subjects if single subject parameter is configured
                    if ($scope.targetSubjectParam && subjAlias.toLowerCase() !== $scope.targetSubjectParam.toLowerCase()) {
                        return;
                    }

                    const matchingResources = (subj.resources || []).filter(res => {
                        if (!res) return false;
                        
                        const matchesSearch = !query || (
                            (res.name && res.name.toLowerCase().includes(query)) ||
                            (res.description && res.description.toLowerCase().includes(query)) ||
                            (res.tags && res.tags.toLowerCase().includes(query)) ||
                            (res.category && res.category.toLowerCase().includes(query)) ||
                            (subjName && subjName.toLowerCase().includes(query)) ||
                            (subjAlias && subjAlias.toLowerCase().includes(query))
                        );

                        const matchesTag = !$scope.selectedTagFilter || (
                            res.tags && res.tags.toLowerCase().split(',').map(t => t.trim()).includes($scope.selectedTagFilter.toLowerCase())
                        );

                        return matchesSearch && matchesTag;
                    });

                    if (matchingResources.length > 0) {
                        result.push({
                            subject_alias: subjAlias,
                            subject_name: subjName,
                            resources: matchingResources
                        });
                        totalMatches += matchingResources.length;
                    }
                });

                $scope.filteredSubjects = result;
                $scope.matchCount = totalMatches;
            };

            // Watch filters and database array; run recalculation exactly once per change
            $scope.$watchGroup(['searchQuery', 'selectedTagFilter', 'subjects'], function() {
                $scope.updateFilteredData();
            });

            // Returns unique categories found in the pre-filtered resource cards of a subject
            $scope.getFilteredCategoriesForSubject = function(subject) {
                const categories = [];
                if (!subject || !subject.resources) return [];
                subject.resources.forEach(res => {
                    const cat = res.category || 'Other';
                    if (categories.indexOf(cat) === -1) {
                        categories.push(cat);
                    }
                });
                return categories;
            };

            $scope.setTagFilter = function(tag) {
                $scope.selectedTagFilter = tag;
            };

            $scope.clearTagFilter = function() {
                $scope.selectedTagFilter = null;
            };

            $scope.loadDirectoryData();
        }]);
    </script>
</body>
</html>
